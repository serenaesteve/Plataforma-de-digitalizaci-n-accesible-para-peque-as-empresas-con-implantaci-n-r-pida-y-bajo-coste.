{% extends "base.html" %}
{% block title %}{{ 'Editar' if producto else 'Nuevo' }} producto{% endblock %}
{% block page_title %}{{ 'Editar producto' if producto else 'Nuevo producto' }}{% endblock %}

{% block topbar_actions %}
  <a href="{{ url_for('productos') }}" class="btn btn-ghost">← Volver</a>
{% endblock %}

{% block content %}
<div class="card" style="max-width: 640px;">
  <form method="POST">
    <div class="form-grid mb-6">
      <div class="form-group">
        <label>Nombre *</label>
        <input type="text" name="nombre" value="{{ producto.nombre if producto else '' }}" required>
      </div>
      <div class="form-group">
        <label>Categoría</label>
        <input type="text" name="categoria" value="{{ producto.categoria if producto else '' }}" placeholder="Ej: Software, Consultoría…">
      </div>
      <div class="form-group">
        <label>Precio (€) *</label>
        <input type="number" name="precio" step="0.01" min="0" value="{{ producto.precio if producto else '' }}" required>
      </div>
      <div class="form-group">
        <label>Stock</label>
        <input type="number" name="stock" min="0" value="{{ producto.stock if producto else 0 }}">
      </div>
      <div class="form-group full">
        <label>Descripción</label>
        <textarea name="descripcion">{{ producto.descripcion if producto else '' }}</textarea>
      </div>
    </div>
    <div class="flex gap-2">
      <button type="submit" class="btn btn-primary">{{ 'Guardar cambios' if producto else 'Crear producto' }}</button>
      <a href="{{ url_for('productos') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
