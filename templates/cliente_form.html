{% extends "base.html" %}
{% block title %}{{ 'Editar' if cliente else 'Nuevo' }} cliente{% endblock %}
{% block page_title %}{{ 'Editar cliente' if cliente else 'Nuevo cliente' }}{% endblock %}

{% block topbar_actions %}
  <a href="{{ url_for('clientes') }}" class="btn btn-ghost">← Volver</a>
{% endblock %}

{% block content %}
<div class="card" style="max-width: 640px;">
  <form method="POST">
    <div class="form-grid mb-6">
      <div class="form-group">
        <label>Nombre *</label>
        <input type="text" name="nombre" value="{{ cliente.nombre if cliente else '' }}" required>
      </div>
      <div class="form-group">
        <label>Empresa</label>
        <input type="text" name="empresa" value="{{ cliente.empresa if cliente else '' }}">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ cliente.email if cliente else '' }}">
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" name="telefono" value="{{ cliente.telefono if cliente else '' }}">
      </div>
      <div class="form-group full">
        <label>Notas</label>
        <textarea name="notas">{{ cliente.notas if cliente else '' }}</textarea>
      </div>
    </div>
    <div class="flex gap-2">
      <button type="submit" class="btn btn-primary">{{ 'Guardar cambios' if cliente else 'Crear cliente' }}</button>
      <a href="{{ url_for('clientes') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
